# -- terminal & colors (Ghostty) ------------------------------------------------

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:usstyle"
set-environment -g COLORTERM truecolor
set -g allow-passthrough on

# -- general -------------------------------------------------------------------

set -s escape-time 0
set -sg repeat-time 600
set -s focus-events on
set -g mouse on
setw -g mode-keys vi
set -g history-limit 50000
set -g set-clipboard on

# -- display -------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 1
set -g monitor-activity on
set -g visual-activity off
set -g status-position top

# -- prefix --------------------------------------------------------------------

unbind C-b
set -g prefix C-z
bind C-z send-prefix

# -- config management ---------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display 'tmux.conf sourced'
bind e new-window -n "[tmux.conf]" '${EDITOR:-vim} ~/.config/tmux/tmux.conf && tmux source ~/.config/tmux/tmux.conf && tmux display "tmux.conf sourced"'

# -- splits --------------------------------------------------------------------

unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# -- pane navigation (no prefix) -----------------------------------------------

bind -n C-S-h select-pane -L
bind -n C-S-j select-pane -D
bind -n C-S-k select-pane -U
bind -n C-S-l select-pane -R

bind -T copy-mode-vi C-S-h select-pane -L
bind -T copy-mode-vi C-S-j select-pane -D
bind -T copy-mode-vi C-S-k select-pane -U
bind -T copy-mode-vi C-S-l select-pane -R

# -- pane resize ---------------------------------------------------------------

bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# -- pane swap -----------------------------------------------------------------

bind > swap-pane -D
bind < swap-pane -U

# -- window navigation ---------------------------------------------------------

unbind n
unbind p
bind -r [ previous-window
bind -r ] next-window
bind Tab last-window
bind c new-window -c "#{pane_current_path}"

# -- vi copy mode --------------------------------------------------------------

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# -- utilities -----------------------------------------------------------------

bind m set -g mouse \; display "mouse: #{?mouse,on,off}"
bind z resize-pane -Z
bind Space display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind T display-menu -T " Theme" -x C -y S \
  "Mauve"    m "source-file ~/.config/tmux/themes/mauve.conf" \
  "Ocean"    o "source-file ~/.config/tmux/themes/ocean.conf" \
  "Warm"     w "source-file ~/.config/tmux/themes/warm.conf" \
  "Contrast" c "source-file ~/.config/tmux/themes/contrast.conf" \
  "Sakura"   s "source-file ~/.config/tmux/themes/sakura.conf" \
  "Neon"     n "source-file ~/.config/tmux/themes/neon.conf"

# -- catppuccin ----------------------------------------------------------------

set -g @catppuccin_flavor "mocha"

# Status bar: dark mantle background band
set -g @catppuccin_status_background "default"
set -g @catppuccin_status_connect_separator "yes"

# Window tabs: rounded pills on dark band
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_number_color "#{@thm_surface_2}"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_flags_icon_current ""
set -g @catppuccin_window_flags_icon_last ""
set -g @catppuccin_window_flags_icon_zoom " 󰁌"
set -g @catppuccin_window_flags_icon_mark ""
set -g @catppuccin_window_flags_icon_silent ""
set -g @catppuccin_window_flags_icon_activity " 󱅫"
set -g @catppuccin_window_flags_icon_bell " 󰂞"

# Pane borders: subtle inactive, lavender active
set -g @catppuccin_pane_border_style "fg=#{@thm_surface_1}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"

# Module customization
set -g @catppuccin_date_time_text " %m/%d %H:%M"
set -g @catppuccin_directory_text " #{b:pane_current_path}"

# -- plugins -------------------------------------------------------------------

set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

set -g @yank_action 'copy-pipe'

setenv -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'
run '~/.local/share/tmux/plugins/tpm/tpm'

# -- status bar layout (after catppuccin loads) --------------------------------

set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
