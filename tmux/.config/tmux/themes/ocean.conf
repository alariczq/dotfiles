# Ocean: cool blue tones, calm and unified
set -g @catppuccin_window_current_number_color "#{@thm_blue}"
set -g @catppuccin_window_number_color "#{@thm_surface_2}"
set -g @catppuccin_session_color "#{?client_prefix,#{E:@thm_red},#{E:@thm_teal}}"
set -g @catppuccin_directory_color "#{E:@thm_lavender}"
set -g @catppuccin_date_time_color "#{E:@thm_sky}"
source-file ~/.config/tmux/themes/_apply.conf
display-message "  Ocean"
