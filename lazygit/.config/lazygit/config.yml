gui:
  border: rounded
  nerdFontsVersion: "3"
  showFileIcons: true
  showFileTree: true
  showRandomTip: false
  scrollOffMargin: 3
  scrollOffBehavior: margin
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    searchingActiveBorderColor:
      - '#f9e2af'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    inactiveViewSelectedLineBgColor:
      - '#6c7086'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    cherryPickedCommitBgColor:
      - '#45475a'
    markedBaseCommitFgColor:
      - '#89b4fa'
    markedBaseCommitBgColor:
      - '#f9e2af'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
  authorColors:
    '*': '#b4befe'
git:
  pagers:
    - colorArg: always
      pager: >-
        delta --paging=never --dark --tabs=4 --syntax-theme="Catppuccin Mocha" --file-style="#cba6f7 bold" --file-decoration-style="#45475a ul" --file-added-label="" --file-removed-label="" --file-modified-label="" --file-renamed-label="" --file-copied-label="" --hunk-header-style=omit --minus-style="syntax #44293A" --minus-emph-style="bold syntax #6E3A3F" --plus-style="syntax #2C3E36" --plus-emph-style="bold syntax #3E5A47" --line-numbers --line-numbers-left-format="" --line-numbers-right-format="{np:>3} " --line-numbers-right-style="#6c7086" --line-numbers-minus-style="#f38ba8" --line-numbers-plus-style="#a6e3a1" --line-numbers-zero-style="#6c7086"
