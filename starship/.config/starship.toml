"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1500
scan_timeout = 30
palette = "pastel"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill\
$jobs\
$direnv\
$docker_context\
$c\
$rust\
$golang\
$nodejs\
$python\
$lua\
$status\
$cmd_duration$battery$time
$character"""

[palettes.pastel]
prompt_pink = "#ffaff3"
os_cyan = "#8bd5ca"
path_blue = "#8aadf4"
git_purple = "#c6a0f6"
muted = "#939ab7"
success_green = "#a6da95"
warning_yellow = "#eed49f"
error_red = "#ed8796"

[username]
show_always = false
style_user = "bold path_blue"
format = "[$user]($style)@"

[hostname]
ssh_only = true
style = "bold git_purple"
format = "[$hostname]($style) "

[directory]
truncation_length = 0
style = "bold path_blue"
read_only = " пҖЈ"
read_only_style = "error_red"
format = "[$path]($style)[$read_only]($read_only_style)"

[git_branch]
symbol = "оңҘ"
style = "bold git_purple"
format = " [$symbol $branch(:$remote_branch)]($style)"
truncation_length = 32

[git_commit]
commit_hash_length = 7
style = "bold muted"
format = " [$hash$tag]($style)"
tag_symbol = " пҖ« "
tag_disabled = false
only_detached = true

[git_state]
style = "bold warning_yellow"
format = "[$state( $progress_current/$progress_total)]($style)"

[git_status]
style = "muted"
ignore_submodules = true
format = " ($conflicted$stashed$deleted$staged$renamed$modified$untracked$ahead_behind)"
ahead = "[вҶ‘](git_purple)[${count}](muted) "
behind = "[вҶ“](git_purple)[${count}](muted) "
diverged = "[вҶ‘](git_purple)[${ahead_count}](muted) [вҶ“](git_purple)[${behind_count}](muted) "
modified = "[у°ӨҢ](warning_yellow) "
untracked = "[?](path_blue) "
staged = "[вң”](success_green) "
conflicted = "[вң•](error_red) "
deleted = "[вңҳ](error_red) "
renamed = "[вҶ’](path_blue) "
stashed = "[вүЎ](os_cyan) "

[jobs]
symbol = "пҖ“ "
style = "bold os_cyan"
format = "[$symbol$number]($style) "

[direnv]
disabled = false
symbol = "пҗ“ "
style = "bold success_green"
format = "[$symbol$loaded]($style) "
loaded_msg = "env"
unloaded_msg = "env?"

[docker_context]
symbol = "пҢҲ"
style = "bold os_cyan"
format = "[$symbol $context]($style) "
only_with_files = true

[c]
symbol = "оҳһ"
style = "bold os_cyan"
format = "[$symbol ($version )]($style) "

[rust]
symbol = "уұҳ—"
style = "bold warning_yellow"
format = "[$symbol ($version )]($style) "

[golang]
symbol = "оҳ§"
style = "bold os_cyan"
format = "[$symbol ($version )]($style) "

[nodejs]
symbol = "оңҳ"
style = "bold success_green"
format = "[$symbol ($version )]($style) "

[python]
symbol = "оҲө"
style = "bold warning_yellow"
format = "[$symbol $pyenv_prefix($version )(\\($virtualenv\\) )]($style) "

[lua]
symbol = "оҳ "
style = "bold path_blue"
format = "[$symbol($version )]($style) "

[cmd_duration]
min_time = 1500
format = "[уұҺ« $duration](warning_yellow) "

[time]
disabled = false
format = "[пҖ— $time](dimmed muted)"
time_format = "%H:%M:%S"

[status]
disabled = false
format = "[вңҳ $status]($style) "
symbol = ""
success_symbol = ""
style = "bold error_red"
map_symbol = false
recognize_signal_code = true

[character]
success_symbol = "[вқҜ](bold prompt_pink)"
error_symbol = "[вқҜ](bold error_red)"
vimcmd_symbol = "[вқ®](bold git_purple)"

[fill]
symbol = " "

[line_break]
disabled = false


