"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1500
scan_timeout = 30
palette = "p10k_soft"

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill\
$jobs\
$direnv\
$docker_context\
$c\
$rust\
$golang\
$nodejs\
$python\
$lua\
$status$cmd_duration$time
$character"""

[palettes.p10k_soft]
prompt_pink = "#ffaff3"
os_cyan = "#8bd5ca"
path_blue = "#8aadf4"
git_purple = "#c6a0f6"
muted = "#939ab7"
success_green = "#a6da95"
warning_yellow = "#eed49f"
error_red = "#ed8796"

[os]
disabled = false
style = "bold white"
format = "[$symbol]($style)"

[os.symbols]
Macos = "´îé"
Linux = "´îÜ"
Arch = "´îâ"
Ubuntu = "´îø"
Debian = "´îå"

[username]
show_always = false
style_user = "bold path_blue"
format = "[$user]($style)@"

[hostname]
ssh_only = true
style = "bold git_purple"
format = "[$hostname]($style) "

[directory]
truncation_length = 0
style = "bold path_blue"
read_only = " ´Çú"
read_only_style = "error_red"
format = " [$path]($style)[$read_only]($read_only_style)"

[git_branch]
symbol = "¯£Ñ"
style = "bold git_purple"
format = " [$symbol $branch(:$remote_branch)]($style)"
truncation_length = 32

[git_commit]
commit_hash_length = 7
style = "bold muted"
format = " [$hash$tag]($style)"
tag_symbol = " ´Ç½ "
tag_disabled = false
only_detached = true

[git_state]
style = "bold warning_yellow"
format = "[$state( $progress_current/$progress_total)]($style)"

[git_status]
style = "muted"
ignore_submodules = true
format = " ($conflicted$stashed$deleted$staged$renamed$modified$untracked$ahead_behind)"
ahead = "[Ôåæ](git_purple)[${count}](muted) "
behind = "[Ôåô](git_purple)[${count}](muted) "
diverged = "[Ôåæ](git_purple)[${ahead_count}](muted) [Ôåô](git_purple)[${behind_count}](muted) "
modified = "[¾░Àê](warning_yellow) "
untracked = "[?](path_blue) "
staged = "[Ô£ö](success_green) "
conflicted = "[Ô£ò](error_red) "
deleted = "[Ô£ÿ](error_red) "
renamed = "[ÔåÆ](path_blue) "
stashed = "[Ôëí](os_cyan) "

[jobs]
symbol = "´Çô "
style = "bold os_cyan"
format = "[$symbol$number]($style) "

[direnv]
disabled = false
symbol = "´Éô "
style = "bold success_green"
format = "[$symbol$loaded]($style) "
loaded_msg = "env"
unloaded_msg = "env?"

[docker_context]
symbol = "´îê"
style = "bold os_cyan"
format = "[$symbol $context]($style) "
only_with_files = true

[c]
symbol = "¯ÿ×"
style = "bold os_cyan"
format = "[$symbol ($version )]($style) "

[rust]
symbol = "¯×¿"
style = "bold warning_yellow"
format = "[$symbol ($version )]($style) "

[golang]
symbol = "¯ÿº"
style = "bold os_cyan"
format = "[$symbol ($version )]($style) "

[nodejs]
symbol = "¯£ÿ"
style = "bold success_green"
format = "[$symbol ($version )]($style) "

[python]
symbol = "¯£╝"
style = "bold warning_yellow"
format = "[$symbol $pyenv_prefix($version )(\\($virtualenv\\) )]($style) "

[lua]
symbol = "¯ÿá"
style = "bold path_blue"
format = "[$symbol($version )]($style) "

[cmd_duration]
min_time = 1500
format = "[¾▒Ä½ $duration](warning_yellow) "

[time]
disabled = false
format = "[´Çù $time](muted)"
time_format = "%H:%M:%S"

[status]
disabled = false
format = "[Ô£ÿ $status]($style) "
symbol = ""
success_symbol = ""
style = "bold error_red"
map_symbol = false
recognize_signal_code = true

[character]
success_symbol = "[ÔØ»](bold prompt_pink)"
error_symbol = "[ÔØ»](bold error_red)"
vimcmd_symbol = "[ÔØ«](bold git_purple)"

[fill]
symbol = " "

[line_break]
disabled = false

[aws]
disabled = true

[package]
disabled = true

[battery]
disabled = true

[kubernetes]
disabled = true
